name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang-format

      - name: Verify clang-format
        run: |
          find core server tests bench \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Configure (GCC)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_BUILD_TYPE=Release
          -DMMSIM_BUILD_TESTS=ON
          -DMMSIM_BUILD_BENCH=ON
          -DMMSIM_BUILD_SERVER=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Benchmarks (smoke)
        run: ./build/bench/mmsim_bench --benchmark_min_time=0.05s
